name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # 1. Tests unitaires
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - run: npm test

  # 2. Tests End-to-End
  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run test:e2e

  # 3. Build & Push de l'image Docker
  build-push:
    runs-on: ubuntu-latest
    needs: e2e-tests
    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
          
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-app:latest

  # 4. Déploiement via SSH sur Azure
  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            # Récupérer l'image
            docker pull ${{ secrets.DOCKER_USERNAME }}/my-app:latest
            
            # Nettoyer l'ancien conteneur (idempotence) en une seule commande avec -f (force)
            docker rm -f my-app || true
            
            # Lancer le nouveau conteneur
            docker run -d --name my-app -p 3000:3000 ${{ secrets.DOCKER_USERNAME }}/my-app:latest
            
            # Healthcheck
            sleep 5
            curl --fail http://localhost:3000/health || exit 1